#config_version=6
# Cuphead Utilities Mode

mode:
  start_events: enter_utilities
  stop_events: exit_utilities
  priority: 10000
  code: utilities.Utilities
  game_mode: false

slide_player:

  # Main utilities slide
  mode_utilities_started:
    utility_slide:
      target: middle
      priority: 10000

  # Topper slide triggered from Python
  show_utility_topper:
    utility_topper_slide:
      target: upper
      priority: 10000

  # Refresh utility text updates
  utility_update:
    utility_slide:
      target: middle
      priority: 10000

sound_player:
  mode_utilities_started:
    poolCupHeadBase:
      action: stop

event_player:
  mode_utilities_started:
    - stop_attract

  mode_utilities_stopped:
    - start_attract

slides:

  # -------------------------
  # Upper display topper
  # -------------------------

  utility_topper_slide:
    widgets:
      - type: image
        image: topper_image
        anchor_x: center
        anchor_y: center
        x: 540
        y: 175
        z: 1

  # -------------------------
  # Middle display
  # -------------------------

  utility_slide:
    widgets:

      - type: rectangle
        width: 1080
        height: 600
        color: black
        z: 1

      - type: text
        text: (utility_title)
        font_size: 70
        color: white
        y: 500
        z: 2

      - type: text
        text: (utility_line1)
        font_size: 45
        color: white
        y: 400
        z: 2

      - type: text
        text: (utility_line2)
        font_size: 45
        color: yellow
        y: 330
        z: 2

      - type: text
        text: (utility_line3)
        font_size: 38
        color: white
        y: 260
        z: 2

      - type: text
        text: (utility_line4)
        font_size: 38
        color: white
        y: 210
        z: 2

      - type: text
        text: (utility_line5)
        font_size: 38
        color: white
        y: 160
        z: 2

      - type: text
        text: (utility_help)
        font_size: 28
        color: cyan
        y: 60
        z: 2

images:
  topper_image:
    file: topper.png
