#config_version=6
# Cuphead Utilities Mode
#
# Enter with keyboard event: enter_utilities
# Menu controls:
#   Left flipper  = previous
#   Right flipper = next
#   Start button  = select / fire coil
#
# In coil test:
#   Left/right flipper scroll through coils
#   Start pulses selected coil
#
# Exit:
#   Keyboard event exit_utilities, or add a physical switch/event later.

mode:
  start_events: enter_utilities
  stop_events: exit_utilities
  priority: 10000
  code: utilities.Utilities
  game_mode: false

slide_player:
  mode_utilities_started:
    utility_slide:
      target: middle
      priority: 10000
  utility_update:
    utility_slide:
      target: middle
      priority: 10000

sound_player:
  mode_utilities_started:
    poolCupHeadBase:
      action: stop

event_player:
  mode_utilities_started:
    - stop_attract
    - mode_attract_stop
  mode_utilities_stopped:
    - start_attract

slides:
  utility_slide:
    widgets:
      - type: rectangle
        width: 1080
        height: 600
        color: black
        z: 1
      - type: text
        text: (utility_title)
        font_size: 70
        color: white
        y: 500
        z: 2
      - type: text
        text: (utility_line1)
        font_size: 45
        color: white
        y: 400
        z: 2
      - type: text
        text: (utility_line2)
        font_size: 45
        color: yellow
        y: 330
        z: 2
      - type: text
        text: (utility_line3)
        font_size: 38
        color: white
        y: 260
        z: 2
      - type: text
        text: (utility_line4)
        font_size: 38
        color: white
        y: 210
        z: 2
      - type: text
        text: (utility_line5)
        font_size: 38
        color: white
        y: 160
        z: 2
      - type: text
        text: (utility_help)
        font_size: 28
        color: cyan
        y: 60
        z: 2

